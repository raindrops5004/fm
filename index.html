<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Forwarder</title>
    <style>
        body { background: #000; color: #222; margin: 0; overflow: hidden; }
    </style>
</head>
<body>

    <!-- Stream 1 -->
    <audio id="stream1" autoplay crossorigin="anonymous">
        <source src="https://usa5.fastcast4u.com/proxy/mcbnjpr?mp=/1" type="audio/mpeg">
    </audio>

    <!-- Stream 2 -->
    <audio id="stream2" autoplay crossorigin="anonymous">
        <source src="https://maggie.torontocast.com:8108/;" type="audio/mpeg">
    </audio>

    <script>
        window.addEventListener('load', () => {
            const s1 = document.getElementById('stream1');
            const s2 = document.getElementById('stream2');

            // Force play attempt on load
            const playStreams = () => {
                s1.play().catch(e => console.log("Autoplay blocked by browser. Click anywhere to start."));
                s2.play().catch(e => {});
            };

            playStreams();

            // Fallback: If browser blocks autoplay, play on the first click anywhere
            document.body.addEventListener('click', () => {
                playStreams();
            }, { once: true });
        });
    </script>
</body>
</html>
