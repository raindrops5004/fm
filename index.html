<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stream Forwarder</title>
    <style>
        body { background-color: #000; color: #111; overflow: hidden; }
    </style>
</head>
<body>

    <!-- Stream 1 -->
    <audio id="stream1" autoplay crossorigin="anonymous">
        <source src="https://usa5.fastcast4u.com/proxy/mcbnjpr?mp=/1" type="audio/mpeg">
    </audio>

    <!-- Stream 2 -->
    <audio id="stream2" autoplay crossorigin="anonymous">
        <source src="https://maggie.torontocast.com:8108/;" type="audio/mpeg">
    </audio>

    <script>
        window.addEventListener('load', async function() {
            const s1 = document.getElementById('stream1');
            const s2 = document.getElementById('stream2');

            const playStreams = async () => {
                for (const stream of [s1, s2]) {
                    stream.muted = true;
                    try {
                        await stream.play();
                        stream.muted = false;
                    } catch (e) {
                        console.log(`Stream ${stream.id} blocked on autoplay:`, e);
                    }
                }
            };

            await playStreams();
        });
    </script>

</body>
</html>
